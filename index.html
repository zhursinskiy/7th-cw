<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <title>Frontend Mentor | Newsletter sign-up form with success message</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->

</head>

<body class="bg-slate-800 min-h-screen flex justify-center items-center">
  <div class="container flex bg-white w-[700px] h-[500px] rounded-2xl overflow-hidden">
    <div class="general flex justify-center items-center p-8">
      <div class="left-text">
        <h1 class="text-4xl text-slate-800 font-bold">Stay updated!</h1>
        <p class="text-xs mt-4">
          Join 60,000+ product managers receiving monthly <br>updates on:
        </p>
        <div class="flex flex-col gap-3 mt-4">
          <div class="items flex items-center">
            <img src="./assets/images/icon-success.svg" class="w-5">
            <span class="text-xs ml-2">Product discovery and building
              what
              matters</span>
          </div>
          <div class="items flex items-center">
            <img src="./assets/images/icon-success.svg" class="w-5">
            <span class="text-xs ml-2">Measuring to ensure updates are
              a success</span>
          </div>
          <div class="items flex items-center">
            <img src="./assets/images/icon-success.svg" class="w-5"><span class="text-xs ml-2">And much more!</span>
          </div>


        </div>
        <div class="cloumn flex flex-col">
          <span class="text-sm mt-6">Email address</span>
          <input type="text" placeholder="email@company.com"
            class=" text-slate-800 w-[300px] h-10 p-2 rounded-sm bg-white border-2 border-slate-800 mt-2">
          <button class="bg-slate-800 text-white w-[300px] p-3 rounded-sm mt-4 text-sm">Subscribe to monthly
            newsletter</button>
        </div>

      </div>
      <div class="right-image">
        <img src="./assets/images/illustration-sign-up-desktop.svg" class="w-[320px] ml-9">
      </div>
    </div>
  </div>
</body>

</html>
