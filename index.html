<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <title>Frontend Mentor | Newsletter sign-up form with success message</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->

</head>

<body class="bg-slate-800 min-h-screen flex justify-center items-center p-4">

  <div class="bg-white rounded-2xl overflow-hidden 
              flex flex-col-reverse lg:flex-row 
              max-w-[900px] w-full">

    <div class="p-6 lg:p-10 flex-1">

      <h1 class="text-3xl lg:text-4xl text-slate-800 font-bold m-15">
        Stay updated!
      </h1>

      <p class="text-sm mt-4">
        Join 60,000+ product managers receiving monthly updates on:
      </p>

      <div class="flex flex-col gap-3 mt-4 text-sm">

        <div class="flex items-center">
          <img src="./assets/images/icon-success.svg" class="w-5">
          <span class="ml-2">Product discovery and building what matters</span>
        </div>

        <div class="flex items-center">
          <img src="./assets/images/icon-success.svg" class="w-5">
          <span class="ml-2">Measuring to ensure updates are a success</span>
        </div>

        <div class="flex items-center">
          <img src="./assets/images/icon-success.svg" class="w-5">
          <span class="ml-2">And much more!</span>
        </div>

      </div>

      <div class="flex flex-col mt-6">
        <span class="text-sm">Email address</span>

        <input type="text" placeholder="email@company.com" class="w-full h-10 p-2 rounded-md border mt-2">

        <button class="bg-slate-800 text-white w-full p-3 rounded-md mt-4 text-sm">
          Subscribe to monthly newsletter
        </button>
      </div>

    </div>
    <div class="flex-1">
      <img src="./assets/images/illustration-sign-up-desktop.svg" class="w-full h-full object-cover hidden lg:block">

      <img src="./assets/images/illustration-sign-up-mobile.svg" class="w-full lg:hidden">
    </div>

  </div>

</body>

</html>
